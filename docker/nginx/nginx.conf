# nginx.conf — configuración principal completa para Laravel + PHP-FPM.
# Reemplaza /etc/nginx/nginx.conf de Debian. El server block va inline
# (no se usa sites-enabled). PHP-FPM escucha en 127.0.0.1:9000 en el mismo
# contenedor (ver docker/supervisord.conf y php-fpm www.conf).

user  www-data;
worker_processes  auto;
pid  /run/nginx.pid;

events {
    worker_connections  1024;
    multi_accept        on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logs a stdout/stderr para que Docker/Dokploy los capture.
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';
    access_log  /dev/stdout  main;
    error_log   /dev/stderr  warn;

    # Rendimiento
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    server_tokens       off;
    types_hash_max_size 2048;

    # Límites de subida (alineados con docker/php/uploads.ini)
    client_max_body_size  50M;
    client_body_timeout   60s;
    client_header_timeout 60s;

    # Compresión
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml
        font/woff2;

    server {
        listen      80 default_server;
        listen      [::]:80 default_server;
        server_name _;

        root  /app/public;
        index index.php;

        charset utf-8;

        # Headers de seguridad básicos
        add_header X-Frame-Options        "SAMEORIGIN"                      always;
        add_header X-Content-Type-Options "nosniff"                         always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        location = /favicon.ico { access_log off; log_not_found off; }
        location = /robots.txt  { access_log off; log_not_found off; }

        # Assets compilados por Vite (nombre con hash) → caché larga e inmutable.
        location ^~ /build/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
            try_files $uri =404;
        }

        # Otros estáticos → caché media.
        location ~* \.(?:css|js|jpe?g|png|gif|ico|svg|webp|woff2?|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public";
            access_log off;
            try_files $uri =404;
        }

        error_page 404 /index.php;

        location ~ \.php$ {
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            include fastcgi_params;
            fastcgi_read_timeout 300;
            fastcgi_send_timeout 300;
            fastcgi_buffer_size 16k;
            fastcgi_buffers 4 16k;
        }

        # No servir dotfiles (excepto .well-known, p.ej. ACME/Let's Encrypt).
        location ~ /\.(?!well-known).* {
            deny all;
        }
    }
}
