# Ejecuta la aplicación (app + PostgreSQL) para probar la imagen localmente.
# Uso:
#   cp .env.example .env
#   # generar una APP_KEY y ponerla en .env (APP_KEY=base64:...)
#   docker compose up -d --build
#   docker compose exec app php artisan migrate --force   # (el entrypoint ya lo intenta)

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    environment:
      APP_NAME: "Global Tax Services"
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: http://localhost:8080
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: declaracion_impuestos
      DB_USERNAME: postgres
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: database
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - storage_app:/app/storage
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: declaracion_impuestos
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  storage_app:
